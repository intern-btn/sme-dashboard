services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - .env.local      # provides SA_PASSWORD, ACCEPT_EULA, MSSQL_PID
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build: .
    # Port 3000 is only exposed internally; Caddy is the public entry point.
    # Uncomment the line below if you need direct HTTP access for debugging:
    # ports:
    #   - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - ./data:/app/data   # persists local file storage across restarts
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mssql_data:
